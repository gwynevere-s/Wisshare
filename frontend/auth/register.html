<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>WisShare - Inscription</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #E8F0FE 0%, #D4E4FC 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.4;
      pointer-events: none;
    }

    .register-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(15px);
      border-radius: 40px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.5);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo p {
      color: #6b7280;
      font-size: 14px;
      margin-top: 8px;
    }

    h2 {
      font-size: 28px;
      color: #1a2a6c;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 32px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #374151;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid #e5e7eb;
      border-radius: 28px;
      font-size: 15px;
      transition: all 0.3s;
      background: white;
    }

    input:focus {
      border-color: #1a73e8;
      outline: none;
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 16px;
    }

    .btn:hover {
      background: #0d47a1;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26, 115, 232, 0.3);
    }

    .btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .divider {
      text-align: center;
      margin: 28px 0;
      color: #9ca3af;
      font-size: 13px;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e5e7eb;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .social-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .social-btn {
      flex: 1;
      padding: 12px;
      border-radius: 32px;
      background: white;
      border: 1.5px solid #e5e7eb;
      color: #4b5563;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .social-btn:hover {
      background: #f9fafb;
      transform: translateY(-2px);
    }

    .message {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      padding: 10px;
      border-radius: 28px;
    }

    .message.success {
      color: #059669;
      background: rgba(5, 150, 105, 0.1);
    }

    .message.error {
      color: #dc2626;
      background: rgba(220, 38, 38, 0.1);
    }

    .link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #6b7280;
    }

    .link a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 500;
    }

    .hidden { display: none; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .shake { animation: shake 0.4s ease-in-out; }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="register-container">
    <div class="card">
      <div class="logo">
        <div class="logo-icon"></div>
        <h1>WisShare</h1>
        <p>Plateforme de mini-projets étudiants</p>
      </div>
      <h2>Inscription</h2>
      <p class="subtitle">Créez votre compte gratuitement</p>

      <div class="form-group">
        <label>Nom complet</label>
        <input type="text" id="regName" placeholder="Votre nom">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="exemple@email.com">
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="regPassword" placeholder="Minimum 6 caractères">
      </div>

      <div class="form-group">
        <label>Confirmer</label>
        <input type="password" id="regConfirm" placeholder="Répétez">
      </div>

      <button class="btn" onclick="register()">S'inscrire</button>

      <div id="registerMsg" class="message hidden"></div>

      <div class="divider">OU</div>

      <div class="social-buttons">
        <div class="social-btn" onclick="alert('Google - Bientôt disponible')">G Google</div>
        <div class="social-btn" onclick="alert('Facebook - Bientôt disponible')">f Facebook</div>
      </div>

      <div class="link">
        Déjà un compte ? <a href="login.html">Se connecter</a>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Fond 3D
    let scene, camera, renderer, particles;
    
    function initBackground() {
      const canvas = document.getElementById('bg-canvas');
      scene = new THREE.Scene();
      scene.background = null;
      
      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 20;
      
      renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);
      
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);
      
      const particleCount = 500;
      const particleGeometry = new THREE.BufferGeometry();
      const particlePositions = new Float32Array(particleCount * 3);
      
      for (let i = 0; i < particleCount; i++) {
        particlePositions[i*3] = (Math.random() - 0.5) * 50;
        particlePositions[i*3+1] = (Math.random() - 0.5) * 30;
        particlePositions[i*3+2] = (Math.random() - 0.5) * 30 - 10;
      }
      
      particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
      const particleMaterial = new THREE.PointsMaterial({ color: 0x1a73e8, size: 0.06, transparent: true, opacity: 0.3 });
      particles = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(particles);
      
      let time = 0;
      function animate() {
        requestAnimationFrame(animate);
        time += 0.01;
        particles.rotation.y = time * 0.05;
        renderer.render(scene, camera);
      }
      animate();
      
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }
    
    initBackground();

    function createParticle() {
      const particle = document.createElement('div');
      particle.style.position = 'fixed';
      particle.style.width = Math.random() * 8 + 3 + 'px';
      particle.style.height = particle.style.width;
      particle.style.background = `radial-gradient(circle, #1a73e8, #0d47a1)`;
      particle.style.borderRadius = '50%';
      particle.style.left = Math.random() * window.innerWidth + 'px';
      particle.style.top = window.innerHeight + 'px';
      particle.style.pointerEvents = 'none';
      particle.style.zIndex = '50';
      document.body.appendChild(particle);
      particle.animate([
        { transform: 'translateY(0px)', opacity: 0.8 },
        { transform: `translateY(-${window.innerHeight + 100}px)`, opacity: 0 }
      ], { duration: (Math.random() * 4 + 2) * 1000, fill: 'forwards' });
      setTimeout(() => particle.remove(), 6000);
    }

    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = 'message ' + type;
      element.classList.remove('hidden');
      setTimeout(() => element.classList.add('hidden'), 5000);
    }

    function shakeCard() {
      document.querySelector('.card').classList.add('shake');
      setTimeout(() => document.querySelector('.card').classList.remove('shake'), 400);
    }

    async function register() {
      const nom = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      const msgEl = document.getElementById('registerMsg');
      const btn = document.querySelector('.btn');

      btn.classList.add('loading');
      btn.textContent = 'Inscription...';

      if (!nom || !email || !password || !confirm) {
        showMessage(msgEl, 'Veuillez remplir tous les champs.', 'error');
        shakeCard();
        btn.classList.remove('loading');
        btn.textContent = 'S\'inscrire';
        return;
      }

      if (password.length < 6) {
        showMessage(msgEl, 'Mot de passe trop court (min 6 caractères).', 'error');
        shakeCard();
        btn.classList.remove('loading');
        btn.textContent = 'S\'inscrire';
        return;
      }

      if (password !== confirm) {
        showMessage(msgEl, 'Les mots de passe ne correspondent pas.', 'error');
        shakeCard();
        btn.classList.remove('loading');
        btn.textContent = 'S\'inscrire';
        return;
      }

      try {
        const response = await fetch('http://localhost/Wisshare/backend/auth/register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom, email, mot_de_passe: password })
        });
        const result = await response.json();

        if (result.success) {
          showMessage(msgEl, '✅ Inscription réussie ! Redirection...', 'success');
          for(let i = 0; i < 30; i++) setTimeout(createParticle, i * 30);
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          showMessage(msgEl, '❌ ' + result.message, 'error');
          shakeCard();
          btn.classList.remove('loading');
          btn.textContent = 'S\'inscrire';
        }
      } catch(err) {
        showMessage(msgEl, '❌ Erreur de connexion au serveur.', 'error');
        shakeCard();
        btn.classList.remove('loading');
        btn.textContent = 'S\'inscrire';
      }
    }
  </script>
</body>
</html>
