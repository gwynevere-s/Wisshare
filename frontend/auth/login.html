<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion - WisShare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo h1 { color: #1a73e8; font-size: 28px; }
    .logo p { color: #888; font-size: 14px; margin-top: 4px; }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
      font-size: 20px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #444;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #1a73e8;
      outline: none;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover { background: #1558b0; }

    .message {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      padding: 10px;
      border-radius: 6px;
    }

    .message.success { color: #2e7d32; background: #e8f5e9; }
    .message.error   { color: #c62828; background: #ffebee; }

    .link {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #666;
    }

    .link a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 600;
    }

    .link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>🎓 WisShare</h1>
    <p>Plateforme de dépôt de mini-projets étudiants</p>
  </div>

  <h2>Se connecter</h2>

  <div class="form-group">
    <label for="email">Adresse email *</label>
    <input type="email" id="email" placeholder="exemple@email.com"/>
  </div>

  <div class="form-group">
    <label for="mot_de_passe">Mot de passe *</label>
    <input type="password" id="mot_de_passe" placeholder="Votre mot de passe"/>
  </div>

  <button class="btn" onclick="connecter()">🔐 Se connecter</button>

  <div id="message" class="message" style="display:none;"></div>

  <div class="link">
    Pas encore de compte ? <a href="register.html">S'inscrire</a>
  </div>
</div>

<script>
  async function connecter() {
    const email        = document.getElementById('email').value.trim();
    const mot_de_passe = document.getElementById('mot_de_passe').value;

    if (!email || !mot_de_passe) {
      showMsg('⚠️ Veuillez remplir tous les champs.', 'error');
      return;
    }

    try {
      const response = await fetch('../../backend/auth/login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, mot_de_passe }),
        credentials: 'include'
      });

      const result = await response.json();

      if (result.success) {
        showMsg('✅ Connexion réussie ! Redirection...', 'success');
        setTimeout(() => window.location.href = '../explore/accueil.html', 1500);
      } else {
        showMsg('❌ ' + result.message, 'error');
      }
    } catch (err) {
      showMsg('❌ Erreur de connexion au serveur.', 'error');
    }
  }

  function showMsg(text, type) {
    const msgEl = document.getElementById('message');
    msgEl.textContent = text;
    msgEl.className = 'message ' + type;
    msgEl.style.display = 'block';
  }
</script>

</body>
</html>
